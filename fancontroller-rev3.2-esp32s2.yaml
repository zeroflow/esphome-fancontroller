# WiFi Fan Controller - Revision 3.2 (ESP32-S2)
# Base configuration file for production use
#
# This file contains the core ESPHome configuration and includes
# the hardware-specific package for revision 3.2

packages:
  # Include hardware-specific configuration
  hardware: github://zeroflow/wifi-fancontroller/hardware-rev-3.2.yaml@main

esphome:
  name: fancontroller-r3-2
  friendly_name: fancontroller
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true
  project:
    name: zeroflow.fancontroller-rev3-2
    version: "3.2"

dashboard_import:
  package_import_url: github://zeroflow/wifi-fancontroller/fancontroller-rev3.2-esp32s2.yaml@main
  import_full_config: false

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

# Enable logging
logger:
  id: logger_component

# API is a requirement of the dashboard import
api:
  id: api_component

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome
    id: ota_esphome

wifi:
  id: wifi_component
  # Enable fallback hotspot in case wifi connection fails
  ap:

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device
captive_portal:
  id: captive_portal_component

# Sets up the improv via serial client for Wi-Fi provisioning.
improv_serial:

# Enable web server
web_server:
  id: web_server_component
  port: 80

# Optional: NeoPixel LED strip support
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO42
    num_leds: 5 # default, increase if needed
    id: neopixel_light
    name: "NeoPixel Light"
    effects:
      - pulse:
      - random:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:
      - addressable_flicker:
