# Example: Hardware Rev 3.1 with Linear Temperature Control + Stall Guard
#
# This example shows how temperature_linear and stall_guard work together.
# The temperature module controls fan speed based on temperature readings,
# while stall guard monitors for stalled fans and sets a safety floor.
#
# During normal operation, temperature_linear has full control.
# If a fan stalls, stall_guard raises the safety floor to recover the fan.
# temperature_linear respects the floor and won't reduce speed below it.
# Press "Clear Stall Warnings" to release the floor after investigating.

packages:
  hardware:
    url: https://github.com/zeroflow/wifi-fancontroller
    ref: main
    files: [hardware-rev-3.1.yaml]
  temperature_linear:
    url: https://github.com/zeroflow/wifi-fancontroller
    ref: main
    files:
      - path: modules/temperature_linear.yaml
        vars:
          friendly_name: "My Fan Controller"
          t_off: "25.0"
          t1: "30.0"
          t2: "45.0"
          fanpercent1: "30.0"
          fanpercent2: "100.0"
  stall_guard:
    url: https://github.com/zeroflow/wifi-fancontroller
    ref: main
    files:
      - path: modules/stall_guard.yaml
        vars:
          friendly_name: "My Fan Controller"
          stall_guard_interval: "5s"
          # Min RPM, step %, grace ticks, and per-fan enable/disable
          # are adjustable at runtime via Home Assistant entities.

esphome:
  name: my-fancontroller
  friendly_name: My Fan Controller

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  - platform: esphome

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Fancontroller Fallback"

# Enable captive portal for WiFi setup
captive_portal:

# How it works:
# 1. temperature_linear controls fan speed based on temperature readings
# 2. stall_guard monitors RPM — if a fan reports 0 RPM while on, it's stalled
# 3. During stall recovery, stall_guard sets a safety floor and raises fan speed
# 4. temperature_linear respects the floor: max(temperature_speed, safety_floor)
# 5. Press "Clear Stall Warnings" to reset floors after investigating the cause
