# Example: Hardware Rev 3.3 with Stall Guard
#
# This example shows how to use the stall guard module to detect and recover
# from fan stalls. When a fan is commanded on but reports 0 RPM, the module
# progressively raises the PWM output to attempt recovery and flags a warning
# in Home Assistant.
#
# IMPORTANT: Do not use stall_guard together with rpm_pi_control.
# Both modules write directly to PWM outputs and will conflict.

packages:
  hardware:
    url: https://github.com/zeroflow/wifi-fancontroller
    ref: main
    files: [hardware-rev-3.3.yaml]
  stall_guard:
    url: https://github.com/zeroflow/wifi-fancontroller
    ref: main
    files:
      - path: modules/stall_guard.yaml
        vars:
          friendly_name: "My Fan Controller"
          stall_guard_interval: "5s"

esphome:
  name: my-fancontroller
  friendly_name: My Fan Controller

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  - platform: esphome

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Fancontroller Fallback"

# Enable captive portal for WiFi setup
captive_portal:

# How to use:
# 1. Flash this config to your fan controller
# 2. In Home Assistant, monitor "Fan X Stall" binary sensors
# 3. If a stall is detected, the module will automatically raise fan speed
# 4. Press "Clear Stall Warnings" button after investigating the cause
# 5. Create HA automations on the binary sensors for notifications
#
# Configuration:
#   stall_guard_interval  — How often to check RPM (compile-time, default: 5s)
#   Min RPM, step %, grace ticks, and per-fan enable/disable are adjustable
#   at runtime via Home Assistant number and switch entities.
