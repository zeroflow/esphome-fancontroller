# WiFi Fan Controller - Revision 4.0 (ESP32-C6)
# Base configuration file for production use
#
# This file contains the core ESPHome configuration and includes
# the hardware-specific package for revision 4.0

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

packages:
  # Include hardware-specific configuration
  hardware: !include hardware-rev-4.0.yaml
  leds: !include
    file: modules/rpm_status_leds.yaml
    vars:
      full_rpm: 100 # any RPM = ok

wifi: !remove

output: # 1 kHz PWMs for testing instead of 25 kHz
  - id: !extend pwm_fan1
    frequency: "1000Hz"
  - id: !extend pwm_fan2
    frequency: "1000Hz"
  - id: !extend pwm_fan3
    frequency: "1000Hz"    
  - id: !extend pwm_fan4
    frequency: "1000Hz"

binary_sensor:
  - id: !extend btn_usr1
    pin:
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - lambda: |-
              auto call = id(status_led).turn_on();
              call.set_rgb(1.0, 0.0, 0.0);
              call.set_brightness(0.5);
              call.perform();
    on_release:
      then:
        - lambda: |-
              auto call = id(status_led).turn_off();
              call.perform();
  - id: !extend btn_usr2
    pin:
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - lambda: |-
              auto call = id(status_led).turn_on();
              call.set_rgb(0.0, 1.0, 0.0);
              call.set_brightness(0.5);
              call.perform();
    on_release:
      then:
        - lambda: |-
              auto call = id(status_led).turn_off();
              call.perform();
  - id: !extend btn_usr3
    pin:
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - lambda: |-
              auto call = id(status_led).turn_on();
              call.set_rgb(0.0, 0.0, 1.0);
              call.set_brightness(0.5);
              call.perform();
    on_release:
      then:
        - lambda: |-
              auto call = id(status_led).turn_off();
              call.perform();

esphome:
  name: fancontroller-r4-0
  friendly_name: fancontroller
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true
  project:
    name: zeroflow.fancontroller-rev4-0
    version: "4.0"

  on_boot:
    then:
      - light.turn_on:
          id: status_led
          red: 10%
          green: 10%
          blue: 10%
          transition_length: 0s
      - delay: 
          1s
      - fan.turn_on:
          id: fan1
          speed: 50
      - fan.turn_on:
          id: fan2
          speed: 50
      - fan.turn_on:
          id: fan3
          speed: 50
      - fan.turn_on:
          id: fan4
          speed: 50
      - light.turn_off:
          id: status_led
          transition_length: 0s

# Enable logging
logger:
  id: logger_component