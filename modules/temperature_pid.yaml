# Temperature PID Control Module
#
# Advanced PID (Proportional-Integral-Derivative) temperature control for precise fan speed regulation.
# Automatically adjusts fan speeds to maintain a target temperature with minimal overshoot.
#
# Credit to https://github.com/patrickcollins12/esphome-fan-controller
# 
# A PID simulator is available at https://fancontroller.arthofer.dev/pid-simulator.
# It uses simplified thermal models — treat results as a starting point for tuning.
#
# Usage:
#   packages:
#     temperature_pid:
#       url: https://github.com/zeroflow/wifi-fancontroller
#       ref: main
#       files: 
#         - path: modules/temperature_pid.yaml
#           vars:
#             friendly_name: "My Fan Controller"
#             kp: "3.0"                          # Proportional gain (UI scale ×100: % fan per °C)
#             ki: "0.005"                        # Integral gain     (UI scale ×100)
#             kd: "0.0"                          # Derivative gain   (UI scale ×100)
#             max_integral: "0.0"                # Maximum integral term
#             output_averaging_samples: "1"      # Output smoothing samples
#             derivative_averaging_samples: "5"  # Derivative smoothing samples
#
# Configuration Variables:
#   - friendly_name: Device name prefix (default: "Fancontroller")
#   - kp: Proportional gain coefficient (default: 0.03)
#   - ki: Integral gain coefficient (default: 0.00005)
#   - kd: Derivative gain coefficient (default: 0.0)
#   - max_integral: Max integral term value (default: 0.0)
#   - output_averaging_samples: Output averaging samples (default: 1)
#   - derivative_averaging_samples: Derivative averaging samples (default: 5)
#
# Features:
#   - Climate entity (thermostat) for Home Assistant integration
#   - Live PID tuning via Home Assistant number entities
#   - Auto-tune button for automatic PID parameter calculation
#   - Deadband control to reduce oscillation near target temperature
#   - Manual override fan control
#   - Individual PID control switches for each of 4 fans
#   - Real-time monitoring of P, I, D terms and error values
#
# Tuning Tips:
#   - Use the "PID Climate Autotune" button for automatic tuning
#   - Start with low kp/ki/kd values and increase gradually
#   - Monitor the P/I/D term sensors to understand controller behavior
#
substitutions:
  friendly_name: "Fancontroller" # default
  kp: "3.0"   # UI scale (×100): 3 ≈ 3% fan per °C
  ki: "0.005" # UI scale (×100)
  kd: "0.0"   # UI scale (×100)
  max_integral: "0.0"
  output_averaging_samples: "1"
  derivative_averaging_samples: "5"

number:
  ## OPTIONAL:
  # RECEIVE KP, KI and KD parameters from input_text.kx helpers in 
  # Home Assistant. See the PID controller below
  # These helper values will get saved to flash thus permanently over-riding 
  # the initial values set in the PID below.

  # KP (scaled x100: 1.0 = 1% fan speed per °C error)
  - platform: template
    name: PID kp
    id: pid_kp_number
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: ${kp}
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    set_action:
      lambda: |-
        id(pid_thermostat).set_kp( x / 100.0 );

  # KI (scaled x100)
  - platform: template
    name: PID ki
    id: pid_ki_number
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: ${ki}
    min_value: 0
    max_value: 0.2
    step: 0.001
    optimistic: true
    set_action:
      lambda: id(pid_thermostat).set_ki( x / 100.0 );

  # KD (scaled x100)
  - platform: template
    name: PID kd
    id: pid_kd_number
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: ${kd}
    min_value: 0
    max_value: 200
    step: 1
    optimistic: true
    set_action:
      lambda: id(pid_thermostat).set_kd( x / 100.0 );

  # Set threshold low
  - platform: template
    name: PID Deadband Threshold Low
    id: pid_threshold_low
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.25
    min_value: 0
    max_value: 5
    step: 0.05
    optimistic: true
    set_action:
      lambda: id(pid_thermostat).set_threshold_low( x * -1.0 );

  # Set threshold high
  - platform: template
    name: PID Deadband Threshold High
    id: pid_threshold_high
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.25
    min_value: 0
    max_value: 5
    step: 0.05
    optimistic: true
    set_action:
      lambda: id(pid_thermostat).set_threshold_high( x );

  # Set ki multiplier
  - platform: template
    name: PID Deadband ki Multiplier
    id: pid_ki_multiplier
    icon: mdi:chart-bell-curve
    restore_value: true
    initial_value: 0.04
    min_value: 0
    max_value: .2
    step: 0.01
    optimistic: true
    set_action:
      lambda: id(pid_thermostat).set_ki_multiplier( x );

  - platform: template
    entity_category: config
    name: PWM Minimum
    id: pwm_minimum
    restore_value: true
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 20
    optimistic: True

output:
  - platform: template
    id: proxy_output
    type: float
    write_action:
      lambda: |-
        float write_val = 
          (id(manual_fan_control).state) ?
            id(manual_fan_control).speed : state*100.0;
        float pwm_min = id(pwm_minimum).state;
        if (write_val > 0.0 && write_val < pwm_min) {
          write_val = pwm_min;
        }
        if (id(pid_control_fan1).state) {
          if (write_val == 0.0) {
            id(fan1).turn_off().perform();
          } else {
            auto call = id(fan1).turn_on();
            call.set_speed(write_val);
            call.perform();
          }
        }
        if (id(pid_control_fan2).state) {
          if (write_val == 0.0) {
            id(fan2).turn_off().perform();
          } else {
            auto call = id(fan2).turn_on();
            call.set_speed(write_val);
            call.perform();
          }
        }
        if (id(pid_control_fan3).state) {
          if (write_val == 0.0) {
            id(fan3).turn_off().perform();
          } else {
            auto call = id(fan3).turn_on();
            call.set_speed(write_val);
            call.perform();
          }
        }
        if (id(pid_control_fan4).state) {
          if (write_val == 0.0) {
            id(fan4).turn_off().perform();
          } else {
            auto call = id(fan4).turn_on();
            call.set_speed(write_val);
            call.perform();
          }
        }

fan:
  # Manual Override switch
  - platform: speed
    id: manual_fan_control
    output: proxy_output
    name: "Fan Manual Override"
    on_turn_off:
      - climate.pid.reset_integral_term: pid_thermostat

# Switches to select which fan is controlled by PID
switch:
  - platform: template
    name: "PID Control Fan 1"
    id: pid_control_fan1
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
  - platform: template
    name: "PID Control Fan 2"
    id: pid_control_fan2
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
  - platform: template
    name: "PID Control Fan 3"
    id: pid_control_fan3
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
  - platform: template
    name: "PID Control Fan 4"
    id: pid_control_fan4
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON


sensor:
########################################################
# START THE FAN CONTROLLER SETUP

  - platform: template
    name: $friendly_name p term
    id: p_term
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: template
    name: $friendly_name i term
    id: i_term
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: template
    name: $friendly_name d term
    id: d_term
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: template
    name: $friendly_name output value
    unit_of_measurement: "%"
    id: o_term
    accuracy_decimals: 2

  - platform: template
    name: $friendly_name error value
    id: e_term
    accuracy_decimals: 2

  - platform: template
    name: $friendly_name is in deadband
    id: in_deadband_term
    accuracy_decimals: 0

# Expose a PID-controlled Thermostat
# Manual: https://esphome.io/components/climate/pid.html
climate:
  - platform: pid
    name: $friendly_name Thermostat
    id: pid_thermostat
    sensor: fancontroller_temperature

    # It is summer right now, so 30c is a decent target.
    default_target_temperature: 30°C
    cool_output: proxy_output

    # ON state change, publish the values to the x_term numbers defined 
    # above, so that they can be viewed in HA
    on_state:
      - sensor.template.publish:
          id: p_term
          state: !lambda 'return -id(pid_thermostat).get_proportional_term() * 100.0;'
      - sensor.template.publish:
          id: i_term
          state: !lambda 'return -id(pid_thermostat).get_integral_term()* 100.0;'
      - sensor.template.publish:
          id: d_term
          state: !lambda 'return -id(pid_thermostat).get_derivative_term()* 100.0;'
      - sensor.template.publish:
          id: o_term
          state: !lambda 'return -id(pid_thermostat).get_output_value()* 100.0;'
      - sensor.template.publish:
          id: in_deadband_term
          state: !lambda 'return id(pid_thermostat).in_deadband();'
      - sensor.template.publish:
          id: e_term
          state: !lambda 'return -id(pid_thermostat).get_error_value();'
        
    # The extents of the HA Thermostat
    visual:
      min_temperature: 20 °C
      max_temperature: 50 °C
  
    # Boot-time fallback only (internal 0-1 scale).
    # Overridden within milliseconds by the number entities above (which
    # restore from flash and call set_kp/ki/kd via set_action on boot).
    # Tune via the HA sliders — substitutions kp/ki/kd set those initial values.
    control_parameters:
      kp: 0.03     # = kp default / 100
      ki: 0.00005  # = ki default / 100
      kd: 0.0      # = kd default / 100
      max_integral: 0.0
      output_averaging_samples: 1
      derivative_averaging_samples: 5

    # How to behave when close to the target temperature?
    deadband_parameters:
      threshold_high: 0.25°C
      threshold_low: -0.25°C
      kp_multiplier: 0.0
      ki_multiplier: 0.3
      kd_multiplier: 0.0
      deadband_output_averaging_samples: 15

button:
- platform: template
  name: "PID Climate Autotune"
  id: pid_autotune
  on_press:
    - climate.pid.autotune: pid_thermostat