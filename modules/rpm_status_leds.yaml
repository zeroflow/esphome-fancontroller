# RPM Status LEDs Module
#
# Visual feedback for fan operation - updates each fan's RGB LED based on its RPM reading.
# LEDs sweep hue from red (stopped) through orange/yellow to green (full speed).
# Uses HSV hue rotation so the LED is always full brightness, making every step vivid.
#
# Usage:
#   packages:
#     rpm_status_leds:
#       url: https://github.com/zeroflow/wifi-fancontroller
#       ref: main
#       files:
#         - path: modules/rpm_status_leds.yaml
#           vars:
#             full_rpm: "2500"        # RPM value considered as 100% speed (green LED)
#             brightness: "0.3"       # LED brightness 0.0–1.0 (default: 0.5)
#             fan3_led_enabled: "false"  # disable LED for unused fan channels
#
#
# Configuration Variables:
#   - full_rpm:          Maximum RPM for color scaling (default: 2500)
#                        At 0 RPM = red, at full_rpm = green
#   - brightness:        LED brightness 0.0–1.0 (default: 0.5)
#   - fan1_led_enabled:  Enable Fan 1 LED (default: true)
#   - fan2_led_enabled:  Enable Fan 2 LED (default: true)
#   - fan3_led_enabled:  Enable Fan 3 LED (default: true)
#   - fan4_led_enabled:  Enable Fan 4 LED (default: true)
#
substitutions:
  full_rpm: "2500"           # default
  brightness: "0.5"          # default
  fan1_led_enabled: "true"   # default
  fan2_led_enabled: "true"   # default
  fan3_led_enabled: "true"   # default
  fan4_led_enabled: "true"   # default

interval:
  - id: rpm_status_leds_interval
    interval: 1s
    then:
      # Fan 1 LED color based on RPM
      - if:
          condition:
            lambda: 'return ${fan1_led_enabled};'
          then:
            - lambda: |-
                float rpm = id(fan1_speed).state;
                if (isnan(rpm)) rpm = 0;
                if (rpm < 0) rpm = 0;
                if (rpm > ${full_rpm}) rpm = ${full_rpm};
                float f = rpm / float(${full_rpm});
                float hue = f * 120.0f; // 0° = red, 120° = green
                float r = (hue < 60.0f) ? 1.0f : (120.0f - hue) / 60.0f;
                float g = (hue < 60.0f) ? hue / 60.0f : 1.0f;
                auto led = id(fan1_led).turn_on();
                led.set_rgb(r, g, 0.0);
                led.set_brightness(${brightness});
                led.set_effect("none");
                led.perform();
      # Fan 2 LED color based on RPM
      - if:
          condition:
            lambda: 'return ${fan2_led_enabled};'
          then:
            - lambda: |-
                float rpm = id(fan2_speed).state;
                if (isnan(rpm)) rpm = 0;
                if (rpm < 0) rpm = 0;
                if (rpm > ${full_rpm}) rpm = ${full_rpm};
                float f = rpm / float(${full_rpm});
                float hue = f * 120.0f; // 0° = red, 120° = green
                float r = (hue < 60.0f) ? 1.0f : (120.0f - hue) / 60.0f;
                float g = (hue < 60.0f) ? hue / 60.0f : 1.0f;
                auto led = id(fan2_led).turn_on();
                led.set_rgb(r, g, 0.0);
                led.set_brightness(${brightness});
                led.set_effect("none");
                led.perform();
      # Fan 3 LED color based on RPM
      - if:
          condition:
            lambda: 'return ${fan3_led_enabled};'
          then:
            - lambda: |-
                float rpm = id(fan3_speed).state;
                if (isnan(rpm)) rpm = 0;
                if (rpm < 0) rpm = 0;
                if (rpm > ${full_rpm}) rpm = ${full_rpm};
                float f = rpm / float(${full_rpm});
                float hue = f * 120.0f; // 0° = red, 120° = green
                float r = (hue < 60.0f) ? 1.0f : (120.0f - hue) / 60.0f;
                float g = (hue < 60.0f) ? hue / 60.0f : 1.0f;
                auto led = id(fan3_led).turn_on();
                led.set_rgb(r, g, 0.0);
                led.set_brightness(${brightness});
                led.set_effect("none");
                led.perform();
      # Fan 4 LED color based on RPM
      - if:
          condition:
            lambda: 'return ${fan4_led_enabled};'
          then:
            - lambda: |-
                float rpm = id(fan4_speed).state;
                if (isnan(rpm)) rpm = 0;
                if (rpm < 0) rpm = 0;
                if (rpm > ${full_rpm}) rpm = ${full_rpm};
                float f = rpm / float(${full_rpm});
                float hue = f * 120.0f; // 0° = red, 120° = green
                float r = (hue < 60.0f) ? 1.0f : (120.0f - hue) / 60.0f;
                float g = (hue < 60.0f) ? hue / 60.0f : 1.0f;
                auto led = id(fan4_led).turn_on();
                led.set_rgb(r, g, 0.0);
                led.set_brightness(${brightness});
                led.set_effect("none");
                led.perform();
