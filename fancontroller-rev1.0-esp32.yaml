# WiFi Fan Controller - Revision 1.0 (ESP32)
# Base configuration file for production use
#
# This file contains the core ESPHome configuration and includes
# the hardware-specific package for revision 1.0.

packages:
  # Include hardware-specific configuration
  hardware: github://zeroflow/wifi-fancontroller/hardware-rev-1.0.yaml@main

esphome:
  name: fancontroller-r1-0
  friendly_name: fancontroller
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true
  project:
    name: zeroflow.fancontroller-rev1-0
    version: "1.0"

dashboard_import:
  package_import_url: github://zeroflow/wifi-fancontroller/fancontroller-rev1.0-esp32.yaml@main
  import_full_config: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  id: logger_component

# API is a requirement of the dashboard import
api:
  id: api_component

# Required by ota.http_request and update.http_request
http_request:

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_http_request

# Firmware update check via HTTP
update:
  - platform: http_request
    id: firmware_update
    name: "Firmware Update"
    source: https://fancontroller.arthofer.dev/firmware/fancontroller-r1-0.manifest.json

wifi:
  id: wifi_component
  # Enable fallback hotspot in case wifi connection fails
  ap:

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device
captive_portal:
  id: captive_portal_component

# Sets up Bluetooth LE (Only on ESP32) to allow the user
# to provision wifi credentials to the device.
esp32_improv:
  authorizer: none

# Sets up the improv via serial client for Wi-Fi provisioning.
improv_serial:
